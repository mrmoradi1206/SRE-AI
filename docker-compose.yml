version: "3.9"

x-agent-env: &agent-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
  DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
  HISTORY_AGENT_URL: ${HISTORY_AGENT_URL:-http://history-agent:8001}
  REPORT_AGENT_URL: ${REPORT_AGENT_URL:-http://report-agent:8002}
  SUPERVISOR_AGENT_URL: ${SUPERVISOR_AGENT_URL:-http://supervisor-agent:8003}
  AI_PROVIDER: ${AI_PROVIDER:-stub}
  AI_MODEL: ${AI_MODEL:-local-fallback}
  AI_API_KEY: ${AI_API_KEY:-}
  AI_EXTRA_CONFIG: ${AI_EXTRA_CONFIG:-{}}
  HTTP_TIMEOUT: ${HTTP_TIMEOUT:-10}
  HTTP_MAX_RETRIES: ${HTTP_MAX_RETRIES:-3}
  HTTP_BACKOFF_SECONDS: ${HTTP_BACKOFF_SECONDS:-0.5}
  HTTP_CIRCUIT_BREAKER_THRESHOLD: ${HTTP_CIRCUIT_BREAKER_THRESHOLD:-3}
  HTTP_CIRCUIT_BREAKER_RESET_SECONDS: ${HTTP_CIRCUIT_BREAKER_RESET_SECONDS:-30}
  DEFAULT_SLA_HOURS: ${DEFAULT_SLA_HOURS:-4}
  MAX_PAGE_SIZE: ${MAX_PAGE_SIZE:-100}
  DEFAULT_PAGE_SIZE: ${DEFAULT_PAGE_SIZE:-20}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}

services:
  postgres:
    image: postgres:16-alpine
    container_name: sre-ai-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sre-ai

  history-agent:
    build:
      context: .
      dockerfile: services/history-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: history-agent
      SERVICE_PORT: ${HISTORY_AGENT_PORT:-8001}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HISTORY_AGENT_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sre-ai

  report-agent:
    build:
      context: .
      dockerfile: services/report-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: report-agent
      SERVICE_PORT: ${REPORT_AGENT_PORT:-8002}
    depends_on:
      postgres:
        condition: service_healthy
      history-agent:
        condition: service_healthy
    ports:
      - "${REPORT_AGENT_PORT:-8002}:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sre-ai

  supervisor-agent:
    build:
      context: .
      dockerfile: services/supervisor-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: supervisor-agent
      SERVICE_PORT: ${SUPERVISOR_AGENT_PORT:-8003}
    depends_on:
      postgres:
        condition: service_healthy
      history-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
    ports:
      - "${SUPERVISOR_AGENT_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sre-ai

  nginx:
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      history-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
      supervisor-agent:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sre-ai

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    depends_on:
      history-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
      supervisor-agent:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - sre-ai

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_AGENT_PORT:-6831}:6831/udp"
    networks:
      - sre-ai

volumes:
  postgres_data:

networks:
  sre-ai:
    driver: bridge
