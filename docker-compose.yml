x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    labels: "service_name"

x-agent-env: &agent-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
  DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
  HISTORY_AGENT_URL: ${HISTORY_AGENT_URL:-http://history-agent:8001}
  REPORT_AGENT_URL: ${REPORT_AGENT_URL:-http://report-agent:8002}
  SUPERVISOR_AGENT_URL: ${SUPERVISOR_AGENT_URL:-http://supervisor-agent:8003}
  OBSERVABILITY_AGENT_URL: ${OBSERVABILITY_AGENT_URL:-http://observability-agent:8003}
  REPO_AGENT_URL: ${REPO_AGENT_URL:-http://repo-agent:8004}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
  ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
  GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
  GITLAB_TOKEN: ${GITLAB_TOKEN:-}
  GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID:-}
  AI_PROVIDER: ${AI_PROVIDER:-stub}
  AI_MODEL: ${AI_MODEL:-local-fallback}
  AI_API_KEY: ${AI_API_KEY:-}
  AI_EXTRA_CONFIG: ${AI_EXTRA_CONFIG:-{}}
  LLM_CONFIG_PATH: ${LLM_CONFIG_PATH:-/app/config/llm_config.json}
  LLM_RUNTIME_SECRETS_PATH: ${LLM_RUNTIME_SECRETS_PATH:-/app/config/llm_runtime_secrets.json}
  REPORT_INTEGRATIONS_CONFIG_PATH: ${REPORT_INTEGRATIONS_CONFIG_PATH:-/app/config/report_integrations.json}
  MATTERMOST_WEBHOOK_URL: ${MATTERMOST_WEBHOOK_URL:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  OPENROUTER_PROXY_URL: ${OPENROUTER_PROXY_URL:-}
  LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:-}
  LLM_GATEWAY_BASE_URL: ${LLM_GATEWAY_BASE_URL:-https://llm.snapp.tech/v1}
  LLM_GATEWAY_PROXY_URL: ${LLM_GATEWAY_PROXY_URL:-}
  GAPGPT_API_KEY: ${GAPGPT_API_KEY:-}
  GAPGPT_BASE_URL: ${GAPGPT_BASE_URL:-https://api.gapgpt.app/v1}
  GAPGPT_PROXY_URL: ${GAPGPT_PROXY_URL:-}
  GAPGPT_DEFAULT_MODEL: ${GAPGPT_DEFAULT_MODEL:-gapgpt-qwen-3.5}
  LLM_PROXY_URL: ${LLM_PROXY_URL:-}
  HTTP_TIMEOUT: ${HTTP_TIMEOUT:-10}
  ALERT_WEBHOOK_SECRET: ${ALERT_WEBHOOK_SECRET:-}
  MAX_ALERT_JSON_BYTES: ${MAX_ALERT_JSON_BYTES:-262144}
  MAX_ALERT_BATCH_SIZE: ${MAX_ALERT_BATCH_SIZE:-100}
  LLM_MAX_BACKOFF_SECONDS: ${LLM_MAX_BACKOFF_SECONDS:-8}
  HTTP_MAX_RETRIES: ${HTTP_MAX_RETRIES:-3}
  HTTP_BACKOFF_SECONDS: ${HTTP_BACKOFF_SECONDS:-0.5}
  HTTP_CIRCUIT_BREAKER_THRESHOLD: ${HTTP_CIRCUIT_BREAKER_THRESHOLD:-3}
  HTTP_CIRCUIT_BREAKER_RESET_SECONDS: ${HTTP_CIRCUIT_BREAKER_RESET_SECONDS:-30}
  DEFAULT_SLA_HOURS: ${DEFAULT_SLA_HOURS:-4}
  MAX_PAGE_SIZE: ${MAX_PAGE_SIZE:-100}
  DEFAULT_PAGE_SIZE: ${DEFAULT_PAGE_SIZE:-20}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sre-ai-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging: *default-logging
    networks:
      - sre-ai

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging: *default-logging
    networks:
      - sre-ai

  history-agent:
    build:
      context: .
      dockerfile: services/history-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: history-agent
      SERVICE_PORT: ${HISTORY_AGENT_PORT:-8001}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HISTORY_AGENT_PORT:-8001}:8001"
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/ready', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    networks:
      - sre-ai

  report-agent:
    build:
      context: .
      dockerfile: services/report-agent/Dockerfile
    user: root
    command: >
      sh -c "chown -R appuser:appuser /app/config &&
      exec su appuser -c 'cd /app/services/report-agent && exec uvicorn main:app --host 0.0.0.0 --port 8002'"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: report-agent
      SERVICE_PORT: ${REPORT_AGENT_PORT:-8002}
    depends_on:
      postgres:
        condition: service_healthy
      history-agent:
        condition: service_healthy
    ports:
      - "${REPORT_AGENT_PORT:-8002}:8002"
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/ready', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    networks:
      - sre-ai

  supervisor-agent:
    build:
      context: .
      dockerfile: services/supervisor-agent/Dockerfile
    user: root
    command: >
      sh -c "chown -R appuser:appuser /app/config &&
      exec su appuser -c 'cd /app/services/supervisor-agent && exec uvicorn main:app --host 0.0.0.0 --port 8003'"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: supervisor-agent
      SERVICE_PORT: ${SUPERVISOR_AGENT_PORT:-8003}
    depends_on:
      postgres:
        condition: service_healthy
      history-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
      redis:
        condition: service_healthy
      observability-agent:
        condition: service_healthy
    ports:
      - "${SUPERVISOR_AGENT_PORT:-8003}:8003"
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/ready', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    networks:
      - sre-ai

  observability-agent:
    build:
      context: .
      dockerfile: services/observability-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: observability-agent
      SERVICE_PORT: ${OBSERVABILITY_AGENT_INTERNAL_PORT:-8003}
    ports:
      - "${OBSERVABILITY_AGENT_PORT:-8004}:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging: *default-logging
    networks:
      - sre-ai

  repo-agent:
    build:
      context: .
      dockerfile: services/repo-agent/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
      SERVICE_NAME: repo-agent
      SERVICE_PORT: ${REPO_AGENT_INTERNAL_PORT:-8004}
    ports:
      - "${REPO_AGENT_PORT:-8005}:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging: *default-logging
    networks:
      - sre-ai

  nginx:
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      history-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
      supervisor-agent:
        condition: service_healthy
      observability-agent:
        condition: service_healthy
      repo-agent:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging: *default-logging
    networks:
      - sre-ai

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    depends_on:
      history-agent:
        condition: service_healthy
      report-agent:
        condition: service_healthy
      supervisor-agent:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging: *default-logging
    networks:
      - sre-ai

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    logging: *default-logging
    networks:
      - sre-ai

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_AGENT_PORT:-6831}:6831/udp"
      - "4317:4317"
      - "4318:4318"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging: *default-logging
    networks:
      - sre-ai

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    depends_on:
      - prometheus
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging: *default-logging
    networks:
      - sre-ai

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging: *default-logging
    networks:
      - sre-ai

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  sre-ai:
    driver: bridge
