<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIOps Platform</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f172a, #1e293b 45%, #0b3b2e);
      --panel: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #34d399;
    }
    body {
      margin: 0;
      font-family: Georgia, serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(720px, calc(100% - 32px));
      padding: 32px;
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    h1 { margin-top: 0; }
    p { color: var(--muted); }
    ul { line-height: 1.8; }
    code { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>AIOps Platform</h1>
    <p>Multi-agent incident investigation stack is ready.</p>
    <ul>
      <li><code>history-agent</code>: port 8001</li>
      <li><code>supervisor-agent</code>: port 8002</li>
      <li><code>report-agent</code>: port 8003</li>
      <li><code>postgres</code>: internal only</li>
    </ul>
    <p>Use the service health endpoints to verify runtime status.</p>
  </div>
</body>
</html>
