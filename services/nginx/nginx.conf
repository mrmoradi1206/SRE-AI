events {
    worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # Rate limiting zone
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=ingest:10m rate=50r/s;

  # Proxy timeouts
  proxy_connect_timeout 10s;
  proxy_send_timeout 60s;
  proxy_read_timeout 180s;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CSP for the SPA
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' /api/; font-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    location = /api/report/health {
      proxy_pass http://report-agent:8002/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/supervisor/health {
      proxy_pass http://supervisor-agent:8003/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/observability/health {
      proxy_pass http://observability-agent:8003/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/repo/health {
      proxy_pass http://repo-agent:8004/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/nodes/prometheus/health {
      proxy_pass http://prometheus:9090/-/healthy;
      proxy_set_header Host $host;
    }

    location = /api/nodes/alertmanager/health {
      proxy_pass http://alertmanager:9093/-/healthy;
      proxy_set_header Host $host;
    }

    location = /api/nodes/grafana/health {
      proxy_pass http://grafana:3000/api/health;
      proxy_set_header Host $host;
    }

    location = /api/nodes/node-exporter/metrics {
      proxy_pass http://node-exporter:9100/metrics;
      proxy_set_header Host $host;
    }

    location = /api/report/ready {
      proxy_pass http://report-agent:8002/ready;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/supervisor/ready {
      proxy_pass http://supervisor-agent:8003/ready;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/config/ {
      proxy_pass http://supervisor-agent:8003/config/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/test-workflow {
      proxy_pass http://supervisor-agent:8003/test-workflow;
      proxy_http_version 1.1;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/alertmanager/webhook {
      limit_req zone=ingest burst=100 nodelay;
      proxy_pass http://history-agent:8001/alerts;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/history/ {
      proxy_pass http://history-agent:8001/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://history-agent:8001/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/report/ {
      proxy_pass http://report-agent:8002/report/;
      proxy_http_version 1.1;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/supervisor/ {
      proxy_pass http://supervisor-agent:8003/supervisor/;
      proxy_http_version 1.1;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/observability/ {
      proxy_pass http://observability-agent:8003/;
      proxy_http_version 1.1;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/repo/ {
      proxy_pass http://repo-agent:8004/;
      proxy_http_version 1.1;
      proxy_send_timeout 180s;
      proxy_read_timeout 180s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
