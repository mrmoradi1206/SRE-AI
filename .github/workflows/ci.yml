name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python sources
        run: python -m compileall shared services
      - name: Validate Docker Compose
        run: docker compose config
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install UI dependencies
        working-directory: services/nginx/ui
        run: npm install
      - name: Build UI
        working-directory: services/nginx/ui
        run: npm run build
